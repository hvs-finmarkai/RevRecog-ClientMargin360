version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
      - "5678:5678"
    environment:
      DATABASE_URL: postgresql://revrecog_user:devpassword@postgres:5432/revrecog_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ENVIRONMENT: development
      DEBUG: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

  celery_worker:
    command: celery -A app.celery_app worker --loglevel=debug --concurrency=1
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://revrecog_user:devpassword@postgres:5432/revrecog_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ENVIRONMENT: development
      DEBUG: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

  celery_beat:
    command: celery -A app.celery_app beat --loglevel=debug
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://revrecog_user:devpassword@postgres:5432/revrecog_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      target: build
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_APP_NAME: RevRecog AI + ClientMargin360 (Dev)

  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: devpassword

  redis:
    ports:
      - "6379:6379"

  nginx:
    ports:
      - "80:80"
