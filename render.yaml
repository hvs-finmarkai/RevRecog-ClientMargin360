services:
  - type: web
    name: revrecog-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py create_admin"
    startCommand: "python manage.py create_admin && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: revrecog-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: revrecog-redis
          type: redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://frontend-dusky-six-16.vercel.app,https://frontend-lk71vcuh5-fin-markai.vercel.app"

  - type: redis
    name: revrecog-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: revrecog-db
    plan: free
    region: oregon
    databaseName: revrecog
    user: revrecog_user
